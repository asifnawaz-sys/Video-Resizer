name: Build ImageResizer macOS App v4.5.2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos-app:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Homebrew dependencies
        run: |
          brew install ffmpeg
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install customtkinter
          pip install Pillow
          pip install opencv-python
          pip install ultralytics
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install openpyxl
          pip install imageio-ffmpeg
          pip install mediapipe  || true
          pip install rembg      || true
          pip install onnxruntime

      - name: Verify all libraries
        run: |
          python3 -c "
          import sys
          libs = {}
          for name, mod in [
              ('customtkinter', 'customtkinter'),
              ('Pillow',        'PIL'),
              ('OpenCV',        'cv2'),
              ('ultralytics',   'ultralytics'),
              ('torch',         'torch'),
              ('mediapipe',     'mediapipe'),
              ('rembg',         'rembg'),
              ('onnxruntime',   'onnxruntime'),
              ('openpyxl',      'openpyxl'),
              ('imageio_ffmpeg','imageio_ffmpeg'),
          ]:
              try:
                  m = __import__(mod)
                  libs[name] = getattr(m, '__version__', 'OK')
              except Exception as e:
                  libs[name] = f'MISSING: {e}'
          critical = ['customtkinter','Pillow','OpenCV','ultralytics','torch','openpyxl']
          all_ok = True
          for name, status in libs.items():
              fail = 'FAILED' in str(status)
              miss = 'MISSING' in str(status)
              icon = 'x' if fail else ('?' if miss else 'v')
              print(f'  [{icon}] {name}: {status}')
              if fail and name in critical: all_ok = False
          if not all_ok:
              sys.exit(1)
          print('All critical libraries OK')
          "

      # ── Download yolov8n.pt via wget (no Python hang risk) ─────────────────
      - name: Download yolov8n.pt model
        run: |
          wget -q --show-progress \
            "https://github.com/ultralytics/assets/releases/download/v8.4.0/yolov8n.pt" \
            -O yolov8n.pt
          ls -lh yolov8n.pt

      # ── Download yolov8m-pose.pt via wget (no Python hang risk) ────────────
      - name: Download yolov8m-pose.pt model
        run: |
          wget -q --show-progress \
            "https://github.com/ultralytics/assets/releases/download/v8.4.0/yolov8m-pose.pt" \
            -O yolov8m-pose.pt
          ls -lh yolov8m-pose.pt

      # ── rembg model ─────────────────────────────────────────────────────────
      - name: Pre-download rembg U2Net model
        run: |
          python3 -c "
          import os, shutil
          os.makedirs('rembg_models', exist_ok=True)
          try:
              from rembg import remove
              from PIL import Image
              import io
              test = Image.new('RGB', (10,10), (255,0,0))
              buf = io.BytesIO(); test.save(buf, 'PNG')
              remove(buf.getvalue())
              print('rembg model downloaded OK')
          except Exception as e:
              print(f'rembg optional: {e}')
          home = os.path.expanduser('~')
          found = []
          for d in [home+'/.u2net',
                    home+'/Library/Application Support/rembg',
                    home+'/.cache/rembg']:
              if os.path.exists(d):
                  for root,dirs,files in os.walk(d):
                      for f in files:
                          if f.endswith('.onnx'):
                              src = os.path.join(root, f)
                              shutil.copy(src, 'rembg_models/'+f)
                              found.append(f)
                              print(f'Bundled: {f}')
          if not found:
              open('rembg_models/.keep','w').write('placeholder')
              print('No rembg models found')
          " || true

      # ── ffmpeg binary ────────────────────────────────────────────────────────
      - name: Collect ffmpeg binary
        run: |
          python3 -c "
          import imageio_ffmpeg, os, shutil
          src = imageio_ffmpeg.get_ffmpeg_exe()
          shutil.copy(src, 'ffmpeg_bundled')
          os.chmod('ffmpeg_bundled', 0o755)
          print(f'ffmpeg_bundled: {os.path.getsize(\"ffmpeg_bundled\")/1024/1024:.1f} MB')
          "

      - name: Get mediapipe path
        run: |
          python3 -c "
          try:
              import mediapipe, os
              mp = os.path.dirname(mediapipe.__file__)
              open('mediapipe_path.txt','w').write(mp)
              print(f'mediapipe: {mp}')
          except:
              open('mediapipe_path.txt','w').write('')
              print('mediapipe not available')
          "

      - name: Generate AppIcon.icns
        run: |
          python3 -c "
          from PIL import Image, ImageDraw
          import os, subprocess
          os.makedirs('AppIcon.iconset', exist_ok=True)
          for size in [16,32,64,128,256,512,1024]:
              img = Image.new('RGBA',(size,size),(0,0,0,0))
              d = ImageDraw.Draw(img)
              r = max(4, int(size*0.22))
              d.rounded_rectangle([0,0,size-1,size-1], radius=r, fill=(10,16,26))
              bw = max(2,size//50)
              d.rounded_rectangle([bw,bw,size-1-bw,size-1-bw], radius=r-bw,
                                  outline=(0,245,160,220), width=bw, fill=None)
              c=size//2; a=max(4,size//5)
              d.polygon([(c-a//2,c+a//4),(c-a//2,c+a+a//4),(c+a//2,c+a//2+a//4)],
                        fill=(0,245,160))
              img.save(f'AppIcon.iconset/icon_{size}x{size}.png')
              if size<=512:
                  img.resize((size*2,size*2),Image.Resampling.LANCZOS).save(
                      f'AppIcon.iconset/icon_{size}x{size}@2x.png')
          r=subprocess.run(['iconutil','-c','icns','AppIcon.iconset','-o','AppIcon.icns'],
                           capture_output=True,text=True)
          print('AppIcon.icns:','OK' if r.returncode==0 else r.stderr)
          "

      - name: Build macOS .app with PyInstaller
        run: |
          MP_PATH=$(cat mediapipe_path.txt)
          MP_ARG=""
          if [ -n "$MP_PATH" ] && [ -d "$MP_PATH" ]; then
            MP_ARG="--add-data $MP_PATH:mediapipe"
          fi

          pyinstaller \
            --windowed \
            --onedir \
            --name "ImageResizer" \
            --icon "AppIcon.icns" \
            --osx-bundle-identifier "com.siardigital.imageresizer" \
            \
            --hidden-import cv2 \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import PIL.ImageTk \
            --hidden-import PIL.ImageOps \
            --hidden-import PIL.ImageFilter \
            --hidden-import PIL.ImageDraw \
            --hidden-import PIL.ImageEnhance \
            --hidden-import customtkinter \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            --hidden-import ultralytics \
            --hidden-import ultralytics.models \
            --hidden-import ultralytics.models.yolo \
            --hidden-import ultralytics.models.yolo.pose \
            --hidden-import ultralytics.nn \
            --hidden-import ultralytics.nn.tasks \
            --hidden-import ultralytics.utils \
            --hidden-import ultralytics.utils.checks \
            --hidden-import torch \
            --hidden-import torchvision \
            --hidden-import mediapipe \
            --hidden-import mediapipe.python \
            --hidden-import mediapipe.python.solutions \
            --hidden-import mediapipe.python.solutions.pose \
            --hidden-import rembg \
            --hidden-import rembg.sessions \
            --hidden-import rembg.sessions.u2net \
            --hidden-import onnxruntime \
            --hidden-import onnxruntime.capi \
            --hidden-import openpyxl \
            --hidden-import openpyxl.styles \
            --hidden-import imageio_ffmpeg \
            \
            --collect-all ultralytics \
            --collect-all customtkinter \
            --collect-all cv2 \
            --collect-all mediapipe \
            --collect-all rembg \
            --collect-all onnxruntime \
            --collect-all imageio_ffmpeg \
            \
            --add-data "yolov8n.pt:." \
            --add-data "yolov8m-pose.pt:." \
            --add-binary "ffmpeg_bundled:." \
            --add-data "rembg_models:rembg_models" \
            $MP_ARG \
            \
            --noconfirm \
            --clean \
            image_resizer_asif.py

      - name: Verify bundle contents
        run: |
          echo "=== Bundle size ===" && du -sh dist/ImageResizer.app
          for f in yolov8n.pt yolov8m-pose.pt; do
            find dist/ImageResizer.app -name "$f" | grep -q . \
              && echo "OK $f bundled" || echo "MISSING $f"
          done
          echo "=== App Contents ==="
          ls dist/ImageResizer.app/Contents/MacOS/ 2>/dev/null | head -10

      - name: Zip the .app
        run: |
          cd dist
          zip -r ../ImageResizer_macOS_SiarDigital_v4.5.2.zip ImageResizer.app
          cd ..
          du -sh ImageResizer_macOS_SiarDigital_v4.5.2.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageResizer-macOS-v4.5.2
          path: ImageResizer_macOS_SiarDigital_v4.5.2.zip
          retention-days: 30
