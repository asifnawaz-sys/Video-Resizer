name: Build ImageResizer macOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos-app:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Homebrew dependencies
        run: |
          brew install ffmpeg
          ffmpeg -version | head -1
          echo "ffmpeg path: $(which ffmpeg)"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install customtkinter
          pip install Pillow
          pip install opencv-python
          pip install ultralytics
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install openpyxl
          pip install imageio-ffmpeg
          pip install mediapipe
          pip install rembg
          pip install onnxruntime

      - name: Verify all libraries
        run: |
          python3 -c "
          import sys
          libs = {}

          for name, mod in [
              ('customtkinter', 'customtkinter'),
              ('Pillow',        'PIL'),
              ('OpenCV',        'cv2'),
              ('ultralytics',   'ultralytics'),
              ('torch',         'torch'),
              ('torchvision',   'torchvision'),
              ('mediapipe',     'mediapipe'),
              ('rembg',         'rembg'),
              ('onnxruntime',   'onnxruntime'),
              ('openpyxl',      'openpyxl'),
              ('imageio_ffmpeg','imageio_ffmpeg'),
          ]:
              try:
                  m = __import__(mod)
                  libs[name] = getattr(m, '__version__', 'OK')
              except Exception as e:
                  libs[name] = f'FAILED: {e}'

          import subprocess
          r = subprocess.run(['ffmpeg','-version'], capture_output=True, text=True)
          libs['ffmpeg (system)'] = r.stdout.splitlines()[0] if r.returncode==0 else 'FAILED'

          all_ok = True
          print('=== LIBRARY STATUS ===')
          for name, status in libs.items():
              failed = 'FAILED' in str(status)
              print(f'  {chr(10060) if failed else chr(9989)} {name}: {status}')
              if failed:
                  all_ok = False
          print()
          if not all_ok:
              print('SOME LIBRARIES FAILED — aborting build')
              sys.exit(1)
          else:
              print('ALL LIBRARIES OK')
          "

      - name: Pre-download YOLOv8n model
        run: |
          python3 -c "
          import os, shutil, glob
          from ultralytics import YOLO

          dest = os.path.join(os.getcwd(), 'yolov8n.pt')

          if os.path.exists(dest):
              print(f'yolov8n.pt already exists ({os.path.getsize(dest)/1024/1024:.1f} MB)')
          else:
              YOLO('yolov8n.pt')
              search_paths = [os.path.expanduser('~/yolov8n.pt')]
              cache = os.path.expanduser('~/.cache/ultralytics')
              if os.path.exists(cache):
                  search_paths += glob.glob(os.path.join(cache,'**','yolov8n.pt'), recursive=True)

              for loc in search_paths:
                  if os.path.exists(loc) and os.path.abspath(loc) != os.path.abspath(dest):
                      shutil.copy(loc, dest)
                      print(f'Copied from: {loc}')
                      break

          assert os.path.exists(dest), 'yolov8n.pt not found!'
          print(f'Model ready: {os.path.getsize(dest)/1024/1024:.1f} MB')
          "

      - name: Pre-download rembg U2Net model
        run: |
          python3 -c "
          import os, shutil
          from rembg import remove
          from PIL import Image
          import io

          print('Downloading rembg U2Net model...')
          test_img = Image.new('RGB', (10, 10), (255, 0, 0))
          buf = io.BytesIO()
          test_img.save(buf, format='PNG')
          remove(buf.getvalue())
          print('rembg model downloaded OK')

          # Find and copy model to working dir for bundling
          home = os.path.expanduser('~')
          search_dirs = [
              os.path.join(home, '.u2net'),
              os.path.join(home, 'Library', 'Application Support', 'rembg'),
              os.path.join(home, '.cache', 'rembg'),
          ]
          found = []
          for d in search_dirs:
              if os.path.exists(d):
                  for root, dirs, files in os.walk(d):
                      for f in files:
                          if f.endswith('.onnx'):
                              src = os.path.join(root, f)
                              found.append(src)
                              print(f'Found model: {src} ({os.path.getsize(src)/1024/1024:.1f} MB)')

          # Copy models to working dir so PyInstaller can bundle them
          # Always create folder so PyInstaller --add-data never fails
          os.makedirs('rembg_models', exist_ok=True)
          if found:
              for src in found:
                  dst = os.path.join('rembg_models', os.path.basename(src))
                  shutil.copy(src, dst)
                  print(f'Copied to rembg_models/{os.path.basename(src)}')
          else:
              with open('rembg_models/.keep', 'w') as f: f.write('placeholder')
              print('WARNING: No rembg .onnx models — app will download on first use')
          "

      - name: Collect ffmpeg binary for bundling
        run: |
          python3 -c "
          import imageio_ffmpeg, os, shutil
          ffmpeg_path = imageio_ffmpeg.get_ffmpeg_exe()
          print(f'imageio_ffmpeg binary: {ffmpeg_path}')
          if os.path.exists(ffmpeg_path):
              shutil.copy(ffmpeg_path, 'ffmpeg_bundled')
              os.chmod('ffmpeg_bundled', 0o755)
              print(f'ffmpeg_bundled: {os.path.getsize(\"ffmpeg_bundled\")/1024/1024:.1f} MB')
          "

      - name: Get mediapipe data path
        run: |
          python3 -c "
          import mediapipe, os
          mp_path = os.path.dirname(mediapipe.__file__)
          print(f'mediapipe path: {mp_path}')
          # Write path to env file for next step
          with open('mediapipe_path.txt', 'w') as f:
              f.write(mp_path)
          "

      - name: Build macOS .app with PyInstaller
        run: |
          MP_PATH=$(cat mediapipe_path.txt)
          echo "Mediapipe path: $MP_PATH"

          pyinstaller \
            --windowed \
            --onedir \
            --name "ImageResizer" \
            --osx-bundle-identifier "com.siardigital.imageresizer" \
            \
            --hidden-import cv2 \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import PIL.ImageTk \
            --hidden-import PIL.ImageOps \
            --hidden-import PIL.ImageFilter \
            --hidden-import PIL.ImageDraw \
            --hidden-import PIL.ImageEnhance \
            --hidden-import customtkinter \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            --hidden-import ultralytics \
            --hidden-import ultralytics.models \
            --hidden-import ultralytics.models.yolo \
            --hidden-import ultralytics.nn \
            --hidden-import ultralytics.nn.tasks \
            --hidden-import ultralytics.utils \
            --hidden-import ultralytics.utils.checks \
            --hidden-import torch \
            --hidden-import torchvision \
            --hidden-import mediapipe \
            --hidden-import mediapipe.python \
            --hidden-import mediapipe.python.solutions \
            --hidden-import mediapipe.python.solutions.face_detection \
            --hidden-import mediapipe.python.solutions.hands \
            --hidden-import mediapipe.python.solutions.pose \
            --hidden-import mediapipe.python.solutions.selfie_segmentation \
            --hidden-import mediapipe.tasks \
            --hidden-import mediapipe.tasks.python \
            --hidden-import rembg \
            --hidden-import rembg.sessions \
            --hidden-import rembg.sessions.u2net \
            --hidden-import onnxruntime \
            --hidden-import onnxruntime.capi \
            --hidden-import openpyxl \
            --hidden-import openpyxl.styles \
            --hidden-import imageio_ffmpeg \
            \
            --collect-all ultralytics \
            --collect-all customtkinter \
            --collect-all cv2 \
            --collect-all mediapipe \
            --collect-all rembg \
            --collect-all onnxruntime \
            --collect-all imageio_ffmpeg \
            \
            --add-data "yolov8n.pt:." \
            --add-binary "ffmpeg_bundled:." \
            --add-data "$MP_PATH:mediapipe" \
            \
            --add-data "rembg_models:rembg_models" \
            \
            --noconfirm \
            --clean \
            image_resizer_asif.py

      - name: Verify bundle contents
        run: |
          echo "=== Bundle size ==="
          du -sh dist/ImageResizer.app

          echo ""
          echo "=== Key files check ==="

          if find dist/ImageResizer.app -name "yolov8n.pt" | grep -q .; then
            echo "✅ yolov8n.pt BUNDLED"
            find dist/ImageResizer.app -name "yolov8n.pt" -exec du -sh {} \;
          else
            echo "❌ yolov8n.pt MISSING"
          fi

          if find dist/ImageResizer.app -name "ffmpeg*" | grep -q .; then
            echo "✅ ffmpeg BUNDLED"
          else
            echo "❌ ffmpeg MISSING"
          fi

          if find dist/ImageResizer.app -path "*/mediapipe*" | grep -q .; then
            echo "✅ mediapipe BUNDLED"
            find dist/ImageResizer.app -path "*/mediapipe*" -name "*.so" | head -3
          else
            echo "❌ mediapipe MISSING"
          fi

          if find dist/ImageResizer.app -name "onnxruntime*" | grep -q .; then
            echo "✅ onnxruntime BUNDLED"
          else
            echo "❌ onnxruntime MISSING"
          fi

          if find dist/ImageResizer.app -name "*.onnx" | grep -q .; then
            echo "✅ rembg .onnx model BUNDLED"
            find dist/ImageResizer.app -name "*.onnx" -exec du -sh {} \;
          else
            echo "⚠️  rembg .onnx model not bundled (will download on first use)"
          fi

          if find dist/ImageResizer.app -name "customtkinter*" | grep -q .; then
            echo "✅ customtkinter BUNDLED"
          else
            echo "❌ customtkinter MISSING"
          fi

          echo ""
          echo "=== MacOS folder contents ==="
          ls dist/ImageResizer.app/Contents/MacOS/ 2>/dev/null || echo "No MacOS folder"
          echo ""
          echo "=== _internal top contents ==="
          ls dist/ImageResizer.app/Contents/MacOS/_internal/ 2>/dev/null | head -30 || \
          ls dist/ImageResizer.app/Contents/Frameworks/ 2>/dev/null | head -20 || \
          echo "Checking Resources..."
          ls dist/ImageResizer.app/Contents/Resources/ 2>/dev/null | head -20

      - name: Zip the .app for download
        run: |
          cd dist
          zip -r ../ImageResizer_macOS_SiarDigital_v4.2.zip ImageResizer.app
          cd ..
          echo "=== Final zip size ==="
          du -sh ImageResizer_macOS_SiarDigital_v4.2.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageResizer-macOS-v4.2
          path: ImageResizer_macOS_SiarDigital_v4.2.zip
          retention-days: 30

