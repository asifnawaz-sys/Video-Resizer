name: Build ImageResizer macOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos-app:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Homebrew dependencies (ffmpeg native)
        run: |
          brew install ffmpeg
          ffmpeg -version | head -1
          echo "ffmpeg path: $(which ffmpeg)"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install customtkinter
          pip install Pillow
          pip install opencv-python
          pip install ultralytics
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install openpyxl
          pip install imageio-ffmpeg
          pip install mediapipe
          pip install rembg
          pip install onnxruntime

      - name: Verify all libraries
        run: |
          python3 -c "
          libs = {}
          
          try:
              import cv2
              libs['OpenCV'] = cv2.__version__
          except Exception as e:
              libs['OpenCV'] = f'FAILED: {e}'
          
          try:
              import PIL
              libs['Pillow'] = PIL.__version__
          except Exception as e:
              libs['Pillow'] = f'FAILED: {e}'
          
          try:
              import customtkinter
              libs['customtkinter'] = customtkinter.__version__
          except Exception as e:
              libs['customtkinter'] = f'FAILED: {e}'
          
          try:
              import ultralytics
              libs['ultralytics/YOLO'] = ultralytics.__version__
          except Exception as e:
              libs['ultralytics/YOLO'] = f'FAILED: {e}'
          
          try:
              import torch
              libs['torch'] = torch.__version__
          except Exception as e:
              libs['torch'] = f'FAILED: {e}'
          
          try:
              import mediapipe
              libs['mediapipe'] = mediapipe.__version__
          except Exception as e:
              libs['mediapipe'] = f'FAILED: {e}'
          
          try:
              import rembg
              libs['rembg'] = 'OK'
          except Exception as e:
              libs['rembg'] = f'FAILED: {e}'
          
          try:
              import openpyxl
              libs['openpyxl'] = openpyxl.__version__
          except Exception as e:
              libs['openpyxl'] = f'FAILED: {e}'
          
          try:
              import imageio_ffmpeg
              import os
              ffmpeg = imageio_ffmpeg.get_ffmpeg_exe()
              libs['imageio_ffmpeg'] = f'OK -> {ffmpeg}'
          except Exception as e:
              libs['imageio_ffmpeg'] = f'FAILED: {e}'

          try:
              import subprocess
              r = subprocess.run(['ffmpeg', '-version'], capture_output=True, text=True)
              libs['ffmpeg (system)'] = r.stdout.splitlines()[0] if r.returncode == 0 else 'FAILED'
          except Exception as e:
              libs['ffmpeg (system)'] = f'FAILED: {e}'
          
          print('=== LIBRARY STATUS ===')
          all_ok = True
          for name, status in libs.items():
              icon = 'FAILED' in str(status)
              print(f'  {\"❌\" if icon else \"✅\"} {name}: {status}')
              if icon:
                  all_ok = False
          print()
          print('ALL OK' if all_ok else 'SOME LIBRARIES FAILED')
          "

      - name: Pre-download YOLOv8n model
        run: |
          python3 -c "
          import os, shutil, glob
          from ultralytics import YOLO

          dest = os.path.join(os.getcwd(), 'yolov8n.pt')

          # If already exists in working dir (checked out from repo), skip download
          if os.path.exists(dest):
              print(f'yolov8n.pt already exists at: {dest}')
              print(f'Size: {os.path.getsize(dest)/1024/1024:.1f} MB')
          else:
              # Download model
              model = YOLO('yolov8n.pt')
              print('yolov8n.pt downloaded')

              # Search possible locations (excluding dest itself)
              search_paths = [
                  os.path.expanduser('~/yolov8n.pt'),
              ]
              # Also search ultralytics cache
              cache_dir = os.path.expanduser('~/.cache/ultralytics')
              if os.path.exists(cache_dir):
                  for f in glob.glob(os.path.join(cache_dir, '**', 'yolov8n.pt'), recursive=True):
                      search_paths.append(f)

              copied = False
              for loc in search_paths:
                  if os.path.exists(loc) and os.path.abspath(loc) != os.path.abspath(dest):
                      shutil.copy(loc, dest)
                      print(f'Copied from: {loc}')
                      copied = True
                      break

              if not copied and not os.path.exists(dest):
                  raise FileNotFoundError('yolov8n.pt not found after download!')

          print(f'Model ready at: {dest}')
          print(f'Size: {os.path.getsize(dest)/1024/1024:.1f} MB')
          assert os.path.exists(dest), 'yolov8n.pt not found!'
          "

      - name: Pre-download rembg U2Net model
        run: |
          python3 -c "
          import os
          print('Pre-downloading rembg U2Net model...')
          try:
              from rembg import remove
              from PIL import Image
              import io, numpy as np
              # Small test to trigger model download
              test_img = Image.new('RGB', (10, 10), (255,0,0))
              buf = io.BytesIO()
              test_img.save(buf, format='PNG')
              result = remove(buf.getvalue())
              print('rembg U2Net model downloaded OK')
              
              # Find where model was saved
              cache_dirs = [
                  os.path.expanduser('~/.cache/torch/hub'),
                  os.path.expanduser('~/.u2net'),
                  os.path.expanduser('~/Library/Application Support/rembg'),
              ]
              for d in cache_dirs:
                  if os.path.exists(d):
                      for root, dirs, files in os.walk(d):
                          for f in files:
                              if f.endswith('.onnx') or f.endswith('.pth'):
                                  path = os.path.join(root, f)
                                  print(f'Model file: {path} ({os.path.getsize(path)/1024/1024:.1f} MB)')
          except Exception as e:
              print(f'rembg model pre-download note: {e}')
              print('rembg will download on first use if needed')
          "

      - name: Collect ffmpeg binary for bundling
        run: |
          python3 -c "
          import imageio_ffmpeg, os, shutil
          
          # Get bundled ffmpeg from imageio_ffmpeg
          ffmpeg_path = imageio_ffmpeg.get_ffmpeg_exe()
          print(f'imageio_ffmpeg bundled binary: {ffmpeg_path}')
          print(f'Exists: {os.path.exists(ffmpeg_path)}')
          
          # Also get system ffmpeg (from brew)
          import subprocess
          r = subprocess.run(['which', 'ffmpeg'], capture_output=True, text=True)
          sys_ffmpeg = r.stdout.strip()
          print(f'System ffmpeg: {sys_ffmpeg}')
          
          # Copy both to working dir for bundling
          if os.path.exists(ffmpeg_path):
              shutil.copy(ffmpeg_path, 'ffmpeg_bundled')
              os.chmod('ffmpeg_bundled', 0o755)
              print(f'Copied imageio ffmpeg -> ffmpeg_bundled')
          
          print(f'ffmpeg_bundled ready: {os.path.exists(\"ffmpeg_bundled\")}')
          "

      - name: Build macOS .app with PyInstaller
        run: |
          pyinstaller \
            --windowed \
            --onedir \
            --name "ImageResizer" \
            --osx-bundle-identifier "com.siardigital.imageresizer" \
            \
            --hidden-import cv2 \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import PIL.ImageTk \
            --hidden-import PIL.ImageOps \
            --hidden-import PIL.ImageFilter \
            --hidden-import PIL.ImageDraw \
            --hidden-import PIL.ImageEnhance \
            --hidden-import customtkinter \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            --hidden-import ultralytics \
            --hidden-import ultralytics.models \
            --hidden-import ultralytics.models.yolo \
            --hidden-import ultralytics.nn \
            --hidden-import ultralytics.nn.tasks \
            --hidden-import ultralytics.utils \
            --hidden-import ultralytics.utils.checks \
            --hidden-import torch \
            --hidden-import torchvision \
            --hidden-import mediapipe \
            --hidden-import mediapipe.python \
            --hidden-import mediapipe.python.solutions \
            --hidden-import mediapipe.python.solutions.face_detection \
            --hidden-import mediapipe.python.solutions.hands \
            --hidden-import mediapipe.python.solutions.pose \
            --hidden-import mediapipe.python.solutions.selfie_segmentation \
            --hidden-import rembg \
            --hidden-import onnxruntime \
            --hidden-import openpyxl \
            --hidden-import openpyxl.styles \
            --hidden-import imageio_ffmpeg \
            \
            --collect-all ultralytics \
            --collect-all customtkinter \
            --collect-all cv2 \
            --collect-all mediapipe \
            --collect-all rembg \
            --collect-all onnxruntime \
            --collect-all imageio_ffmpeg \
            \
            --add-data "yolov8n.pt:." \
            --add-binary "ffmpeg_bundled:." \
            \
            --noconfirm \
            --clean \
            image_resizer_asif.py

      - name: Verify all binaries inside .app bundle
        run: |
          echo "=== Bundle size ==="
          du -sh dist/ImageResizer.app
          
          echo ""
          echo "=== Key files check ==="
          
          # yolov8n.pt
          if find dist/ImageResizer.app -name "yolov8n.pt" | grep -q .; then
            echo "✅ yolov8n.pt BUNDLED"
            find dist/ImageResizer.app -name "yolov8n.pt" -exec du -sh {} \;
          else
            echo "❌ yolov8n.pt MISSING"
          fi
          
          # ffmpeg
          if find dist/ImageResizer.app -name "ffmpeg*" | grep -q .; then
            echo "✅ ffmpeg BUNDLED"
            find dist/ImageResizer.app -name "ffmpeg*"
          else
            echo "❌ ffmpeg MISSING"
          fi
          
          # mediapipe
          if find dist/ImageResizer.app -path "*/mediapipe*" -name "*.so" | grep -q .; then
            echo "✅ mediapipe native libs BUNDLED"
          else
            echo "⚠️  mediapipe .so not found (may still work via Python)"
          fi
          
          # rembg / onnxruntime
          if find dist/ImageResizer.app -name "onnxruntime*" | grep -q .; then
            echo "✅ onnxruntime BUNDLED (rembg backend)"
          else
            echo "⚠️  onnxruntime not found"
          fi
          
          echo ""
          echo "=== Top-level contents ==="
          ls dist/ImageResizer.app/Contents/MacOS/_internal/ | head -30

      - name: Zip the .app for download
        run: |
          cd dist
          zip -r ../ImageResizer_macOS_SiarDigital_v4.1.zip ImageResizer.app
          cd ..
          echo "=== Final zip size ==="
          du -sh ImageResizer_macOS_SiarDigital_v4.1.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageResizer-macOS-v4.1
          path: ImageResizer_macOS_SiarDigital_v4.1.zip
          retention-days: 30
