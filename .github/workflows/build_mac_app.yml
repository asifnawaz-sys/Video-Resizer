name: Build VideoResizer macOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos-app:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install imageio-ffmpeg
          pip install moviepy
          pip install opencv-python
          pip install Pillow
          pip install ttkbootstrap
          pip install ultralytics
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Verify imageio-ffmpeg (bundled ffmpeg)
        run: |
          python3 -c "
          import imageio_ffmpeg, os, subprocess
          ffmpeg = imageio_ffmpeg.get_ffmpeg_exe()
          print(f'Bundled ffmpeg: {ffmpeg}')
          print(f'Exists: {os.path.exists(ffmpeg)}')
          r = subprocess.run([ffmpeg, '-version'], capture_output=True, text=True)
          print(r.stdout.splitlines()[0])
          print('imageio-ffmpeg OK!')
          "

      - name: Get imageio-ffmpeg binary path for bundling
        id: ffmpeg_path
        run: |
          FFMPEG_PATH=$(python3 -c "import imageio_ffmpeg; print(imageio_ffmpeg.get_ffmpeg_exe())")
          FFMPEG_DIR=$(dirname "$FFMPEG_PATH")
          echo "ffmpeg_path=$FFMPEG_PATH" >> $GITHUB_OUTPUT
          echo "ffmpeg_dir=$FFMPEG_DIR"   >> $GITHUB_OUTPUT
          echo "Bundling ffmpeg from: $FFMPEG_DIR"

      - name: Build macOS .app with PyInstaller
        run: |
          FFMPEG_DIR=$(python3 -c "import imageio_ffmpeg, os; print(os.path.dirname(imageio_ffmpeg.get_ffmpeg_exe()))")

          pyinstaller \
            --windowed \
            --onedir \
            --name "VideoResizer" \
            --osx-bundle-identifier "com.siardigital.videoresizer" \
            \
            --hidden-import cv2 \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import PIL.ImageTk \
            --hidden-import PIL.ImageFilter \
            --hidden-import ttkbootstrap \
            --hidden-import ttkbootstrap.themes \
            --hidden-import ttkbootstrap.style \
            --hidden-import ultralytics \
            --hidden-import ultralytics.models \
            --hidden-import ultralytics.models.yolo \
            --hidden-import ultralytics.nn \
            --hidden-import ultralytics.utils \
            --hidden-import moviepy \
            --hidden-import moviepy.editor \
            --hidden-import moviepy.video \
            --hidden-import moviepy.audio \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            --hidden-import torch \
            --hidden-import torchvision \
            --hidden-import imageio_ffmpeg \
            \
            --collect-all ultralytics \
            --collect-all ttkbootstrap \
            --collect-all moviepy \
            --collect-all cv2 \
            --collect-all imageio_ffmpeg \
            \
            --noconfirm \
            --clean \
            video_resizer_asif.py

      - name: Verify ffmpeg inside .app bundle
        run: |
          echo "=== Searching for ffmpeg inside .app ==="
          find dist/VideoResizer.app -name "ffmpeg*" 2>/dev/null || echo "No ffmpeg binary found (will use imageio_ffmpeg at runtime)"

          echo "=== Verifying imageio_ffmpeg can resolve inside bundle ==="
          python3 -c "
          import sys
          # Simulate bundled environment
          internal = 'dist/VideoResizer.app/Contents/MacOS/_internal'
          sys.path.insert(0, internal)
          try:
              import imageio_ffmpeg
              ffmpeg = imageio_ffmpeg.get_ffmpeg_exe()
              import os
              print(f'ffmpeg path: {ffmpeg}')
              print(f'ffmpeg exists: {os.path.exists(ffmpeg)}')
              print('Bundle verification OK!')
          except Exception as e:
              print(f'Bundle verification note: {e}')
              print('App will fall back to system ffmpeg if needed')
          " 2>/dev/null || echo "Verification skipped - will test at runtime"

      - name: Zip the .app for download
        run: |
          cd dist
          zip -r ../VideoResizer_macOS_SiarDigital_v5.3.zip VideoResizer.app
          cd ..
          echo "=== Final zip size ==="
          du -sh VideoResizer_macOS_SiarDigital_v5.3.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoResizer-macOS-v5.3
          path: VideoResizer_macOS_SiarDigital_v5.3.zip
          retention-days: 30
